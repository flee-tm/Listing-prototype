<style>
  .app main { padding-bottom: 8px; }
  .app .m-footer { padding-bottom: 240px; } /* el footer extiende su fondo ottanio tras la barra fija (JS lo ajusta) */

  /* ---- Card pagina prodotto ---- */
  .pcard { position: relative; width: calc(100% - 32px); max-width: 350px; margin: 20px auto 0;
    border: 1px solid var(--card-border); border-radius: 24px;
    background: #fff; padding: 16px; display: flex; flex-direction: column; gap: 16px; align-items: center; overflow: hidden; }
  .pcard.promo { border: 2px solid var(--promo); }
  .pcard-tagrow { display: flex; align-items: center; width: 100%; min-height: 24px; }
  .pcard-img { width: 100%; height: 140px; overflow: hidden; }
  .pcard-img img { width: 100%; height: 100%; object-fit: contain; }
  .pcard-repr { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ottanio-flee); }
  .pcard-repr .icon { width: 16px; height: 16px; flex-shrink: 0; }
  .pcard-usato { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: #04475c; }
  .pcard-usato .icon { width: 16px; height: 16px; }
  .pcard-title { text-align: center; max-width: 240px; color: var(--ottanio-flee); line-height: 1.1; }
  .pcard-title .kicker { display: block; font-size: 14px; font-weight: 600; }
  .pcard-title .name { font-size: 28px; font-weight: 600; }
  .pcard-title .version { display: block; font-size: 16px; font-weight: 400; margin-top: 2px; }
  .pcard-colors { text-align: center; }
  .pcard-colors .lbl { font-size: 12px; font-weight: 600; color: #04475c; }
  .pcard-colors .vals { font-size: 12px; color: #04475c; margin-top: 2px; }

  /* ---- Secciones ---- */
  .sec { padding: 40px 16px; }
  .sec h2 { font-size: 20px; font-weight: 600; line-height: 1.3; }
  .sec-center h2 { text-align: center; }

  /* ---- Calcola il tuo canone ---- */
  .fields { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
  .m-field { display: flex; flex-direction: column; gap: 8px; }
  .m-field > label { font-size: 16px; color: var(--ottanio-flee); }
  /* Dropdown custom (componente DropdownInput, mismo del form) */
  .dd { position: relative; }
  .dd-field { width: 100%; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 0 24px; border: 1px solid var(--card-border); border-radius: 16px; background: #fff; cursor: pointer;
    font-family: inherit; font-size: 16px; color: var(--ottanio-flee); text-align: left; transition: border-color .2s ease; }
  .dd[data-open="true"] .dd-field, .dd-field:focus-visible { border-color: var(--ottanio-flee); outline: none; }
  .dd-val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dd-val.is-ph, .dd-val.is-dim { color: #879da6; }
  .dd-icon { position: relative; width: 24px; height: 24px; flex-shrink: 0; color: var(--ottanio-flee); transition: transform .2s ease, color .2s ease; }
  .dd-icon::before { content: ''; position: absolute; top: 46%; left: 50%; width: 7px; height: 7px;
    border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: translate(-50%, -50%) rotate(45deg); }
  .dd[data-open="true"] .dd-icon { transform: rotate(180deg); }
  .dd-panel { position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 45;
    max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    border: 1px solid var(--ottanio-flee); border-radius: 16px; background: #fff; box-shadow: 0 12px 32px rgba(4,81,104,.18); }
  .dd-opt { display: flex; align-items: center; width: 100%; min-height: 48px; padding: 0 24px; border: 0;

  .m-hint { display: flex; gap: 6px; align-items: flex-start; font-size: 12px; line-height: 1.4; color: #5b747f; }
  .m-hint .icon { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
  .m-hint b { font-weight: 600; }
  .m-hint .hl { display: block; }
  .m-hint .hl + .hl { margin-top: 6px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; min-height: 44px; }

  .toggle-row .tr-s { font-size: 13px; color: var(--ottanio-flee); margin-top: 4px; }

  .m-breadcrumb { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 4px;
    margin-top: 24px; font-size: 14px; color: var(--ottanio-700); }
  .m-breadcrumb .icon { width: 16px; height: 16px; color: var(--ottanio-700); }

  /* ---- Accordion cards (specs) ---- */
  .acards { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
  .acard { background: var(--secondary-100); border: 1px solid var(--card-alt); border-radius: 16px; overflow: hidden; }
  .acard-head { width: 100%; display: flex; align-items: center; gap: 16px; padding: 24px; text-align: left; }
  .acard-head .txt { flex: 1; display: flex; flex-direction: column; }
  .acard-head .txt .t { font-size: 20px; font-weight: 600; color: var(--ottanio-flee); }
  .acard-head .txt .s { font-size: 14px; color: var(--ottanio-flee); margin-top: 2px; }
  .acard-head .icon { width: 24px; height: 24px; color: var(--ottanio-flee); transition: transform .2s ease; flex-shrink: 0; }
  .acard.open .acard-head .icon { transform: rotate(180deg); }

  .spec-list .row b { font-weight: 600; color: var(--ottanio-flee); }

  /* ---- Cosa include (accordion, default abierto) ---- */
  .sec-include { background: var(--secondary-100); padding: 40px 16px; }
  .inc-head { width: 100%; display: flex; align-items: flex-start; gap: 24px; text-align: left; }

  .inc-chev { width: 28px; height: 28px; color: var(--ottanio-flee); flex-shrink: 0; transition: transform .2s ease; }
  .sec-include.open .inc-chev { transform: rotate(180deg); }
  .inc-body { display: none; flex-direction: column; gap: 24px; margin-top: 24px; }
  .sec-include.open .inc-body { display: flex; }
  .inc-item { display: flex; gap: 10px; align-items: flex-start; }
  .inc-item > .icon { width: 20px; height: 20px; color: var(--ottanio-flee); flex-shrink: 0; margin-top: 1px; }
  .inc-item > .icon img { width: 100%; height: 100%; display: block; object-fit: contain; }
  .inc-t { font-size: 16px; font-weight: 500; color: var(--ottanio-flee); }
  .inc-s { font-size: 12px; color: var(--ottanio-flee); margin-top: 2px; line-height: 1.35; }
  .inc-foot { display: flex; gap: 4px; font-size: 12px; font-weight: 500; line-height: 1.4; color: var(--ottanio-flee); }

  /* ---- Cosa include · variante PPU ---- */
  .inc-body.ppu { gap: 16px; }

  .inc-partner .ph { font-size: 14px; color: var(--ottanio-flee); }

  .inc-partner .ps { font-size: 13px; color: var(--ottanio-700); line-height: 1.4; }
  .inc-group { display: flex; flex-direction: column; gap: 16px; margin-top: 10px; }
  .inc-gh { font-size: 16px; font-weight: 600; color: var(--ottanio-flee); }
  .inc-flee-head { display: flex; flex-direction: column; gap: 8px; }
  .inc-flee-logo { width: 52px; }
  .inc-flee-logo svg { display: block; width: 100%; }
  .cov-item { display: flex; gap: 8px; align-items: flex-start; }
  .cov-item > .icon { width: 20px; height: 20px; color: var(--ottanio-flee); flex-shrink: 0; margin-top: 2px; }
  .cov-item > .icon img { width: 100%; height: 100%; display: block; object-fit: contain; }
  .cov-t { font-size: 16px; font-weight: 500; color: var(--ottanio-flee); line-height: 1.4; }
  .cov-s { font-size: 12px; color: var(--ottanio-flee); margin-top: 4px; }
  .cov-badge { display: inline-block; vertical-align: middle; font-size: 12px; font-weight: 500; line-height: 1.5;
    border-radius: 4px; padding: 0 5px; white-space: nowrap; margin-left: 2px; }
  .cov-badge.red { background: #c21a17; color: #fff; }
  .cov-badge.grey { background: #c9d5da; color: #04475c; }
  .srv-item { display: flex; gap: 12px; align-items: flex-start; }
  .srv-item > .icon { width: 20px; height: 20px; color: var(--ottanio-flee); flex-shrink: 0; margin-top: 1px; }
  .srv-item span { font-size: 15px; color: var(--ottanio-flee); line-height: 1.35; }

  /* ---- Flee Care (solo PPU) · card oscura ---- */
  .fc-card { width: 100%; background: var(--ottanio-flee); border-radius: 20px; padding: 24px; color: #fff; }
  .fc-head { display: flex; align-items: center; gap: 12px; }
  .fc-head .icon { width: 28px; height: 28px; color: #fff; }
  .fc-head h3 { font-size: 20px; font-weight: 600; color: #fff; }
  .fc-desc { font-size: 15px; line-height: 1.5; color: rgba(255,255,255,.9); margin-top: 16px; }
  .fc-more { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 700; color: #fff; margin-top: 16px; }
  .fc-more .icon { width: 18px; height: 18px; }
  .fc-divider { height: 1px; background: rgba(255,255,255,.2); margin: 24px 0; }
  .fc-q { font-size: 16px; font-weight: 600; color: #fff; }
  .fc-opt { display: flex; align-items: center; gap: 12px; padding: 14px 0; font-size: 16px; color: #fff; cursor: pointer; }
  .fc-box { width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,.55); border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; }
  .fc-box .icon { width: 14px; height: 14px; opacity: 0; }
  .fc-opt.on .fc-box { background: var(--green-flee); border-color: var(--green-flee); }
  .fc-opt.on .fc-box .icon { opacity: 1; color: var(--ottanio-flee); }
  .fc-radio { width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,.55); border-radius: 50%; flex-shrink: 0; position: relative; }
  .fc-opt.on .fc-radio { border-color: #fff; }
  .fc-opt.on .fc-radio::after { content: ''; position: absolute; inset: 4px; border-radius: 50%; background: #fff; }
  .fc-note { display: flex; gap: 12px; align-items: flex-start; background: rgba(255,255,255,.08); border-radius: 16px; padding: 16px; margin-top: 24px; }
  .fc-note .icon { width: 26px; height: 26px; color: var(--green-flee); flex-shrink: 0; }
  .fc-note p { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,.9); }

  /* ---- I vantaggi ---- */
  .vant .lead { font-size: 16px; line-height: 1.5; color: var(--ottanio-flee); margin-top: 32px; }
  .vant-list { display: flex; flex-direction: column; gap: 24px; margin-top: 32px; }
  .vant-item { display: flex; gap: 16px; align-items: flex-start; }
  .vant-item .icon { width: 20px; height: 20px; color: var(--ottanio-flee); flex-shrink: 0; margin-top: 2px; }
  .vant-item .vi-t { font-size: 16px; font-weight: 600; color: var(--ottanio-flee); }
  .vant-item .vi-d { font-size: 16px; line-height: 1.45; color: var(--ottanio-flee); margin-top: 4px; }

  /* ---- Pricing bar (sticky bottom) ---- */
  .pricebar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px;
    z-index: 50; background: var(--ottanio-flee); border-top: 2.5px solid var(--secondary-900);
    padding: 18px 16px calc(12px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .pricebar-toggle { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); height: 32px;
    display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 100px; background: var(--secondary-900);
    color: #fff; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .pricebar-toggle .icon { width: 14px; height: 14px; }
  .pb-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .pb-col { display: flex; flex-direction: column; align-items: center; }
  .pb-plus { width: 24px; height: 24px; color: #fff; }
  .pricebar .pb-strike { color: #fff; font-size: 20px; font-weight: 500; text-decoration: line-through; line-height: 1; }
  .pricebar .pb-price { display: flex; align-items: flex-start; gap: 4px; color: #fff; }
  .pricebar .pb-price .num { font-size: 40px; font-weight: 700; line-height: 1; }
  .pricebar .pb-price .unit { display: flex; flex-direction: column; gap: 4px; line-height: 1; padding-top: 2px; }
  .pricebar .pb-price .unit .cur { font-size: 0; }
  .pricebar .pb-price .unit .cur b { font-size: 20px; font-weight: 400; }
  .pricebar .pb-price .unit .cur span { font-size: 12px; font-weight: 500; }
  .pricebar .pb-price .unit small { font-size: 12px; }
  .pricebar .pb-promo { background: #f4d9ed; color: var(--promo); font-size: 12px; font-weight: 600; border-radius: 8px; padding: 4px 8px; }
  .pricebar .pb-cta { width: 100%; height: 56px; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--green-flee); color: var(--ottanio-flee); border-radius: 48px; font-size: 16px; font-weight: 700; }
  .pricebar .pb-note { font-size: 11px; color: var(--text-negative); text-align: center; }

  /* ---- Riepilogo (overlay "Mostra dettagli") · tema oscuro ---- */
  .riep { position: fixed; top: 0; bottom: 0; left: 50%; width: 100%; max-width: 430px; z-index: 60;
    transform: translateX(-50%) translateY(100%); transition: transform .3s cubic-bezier(.22,1,.36,1);
    background: var(--ottanio-flee); display: flex; flex-direction: column; }
  .riep.open { transform: translateX(-50%) translateY(0); }
  .riep-head { flex-shrink: 0; padding: 16px; }
  .riep-close { display: inline-flex; align-items: center; gap: 12px; color: #fff; font-size: 16px; font-weight: 500; }
  .riep-x { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; }
  .riep-x .icon { width: 15px; height: 15px; color: #fff; }
  .riep-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px 24px; display: flex; flex-direction: column; gap: 24px; }
  .riep-scroll > * { flex-shrink: 0; }
  .riep-card { position: relative; overflow: hidden; background: var(--ottanio-700); border-radius: 16px;
    padding: 40px 24px 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; color: #fff; }
  .riep-card .mcard-promotag { background: #f4d9ed; }
  .riep-img { width: 100%; overflow: hidden; }
  .riep-img img { width: 100%; height: 150px; object-fit: contain; display: block; }
  .riep-repr { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #fff; }
  .riep-repr .icon { width: 18px; height: 18px; }

  .riep-spec .icon { width: 14px; height: 14px; }
  .riep-panel { background: var(--ottanio-700); border-radius: 16px; padding: 24px; color: #fff; }

    font-size: 20px; font-weight: 600; color: #fff; text-align: left; }
  .riep-acc-head .icon { width: 24px; height: 24px; transition: transform .2s ease; transform: rotate(180deg); }
  .riep-panel.closed .riep-acc-head .icon { transform: none; }

  .riep-panel.closed .riep-acc-body { display: none; }
  .riep-ci { display: flex; gap: 10px; align-items: flex-start; }
  .riep-ci > .icon { width: 20px; height: 20px; color: #fff; flex-shrink: 0; margin-top: 1px; }
  .riep-ci > .icon img { width: 100%; height: 100%; display: block; object-fit: contain; filter: brightness(0) invert(1); }
  .riep-ci .t { font-size: 16px; font-weight: 500; }
  .riep-ci .s { font-size: 12px; color: rgba(255,255,255,.85); margin-top: 2px; line-height: 1.35; }
  .riep-foot { display: flex; gap: 4px; font-size: 12px; line-height: 1.4; color: rgba(255,255,255,.85); }
  .riep-summary h3 { font-size: 20px; font-weight: 600; }
  .riep-summary .riep-divider { margin: 24px 0; }
  .riep-rows { display: flex; flex-direction: column; gap: 8px; }
  .riep-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; font-size: 14px; }
  .riep-row .k { color: rgba(255,255,255,.85); }
  .riep-row .v { font-weight: 600; }
  .riep-row .v small { font-weight: 400; font-size: 12px; }

<body>
  <div class="app">
    <div id="flee-header"></div>
    <main>
      <div id="pcard"></div>

      <section class="sec">
        <h2>Calcola il tuo canone</h2>
        <div class="fields" id="fields"></div>
        <nav class="m-breadcrumb" id="breadcrumb"></nav>
      </section>

      <section class="sec-include open" id="include"></section>

      <section class="sec sec-center">
        <h2 id="allest-title">Perché sceglierla con Flee</h2>
        <div class="acards" id="specs"></div>
      </section>

      <section class="sec" id="fleecare-sec" hidden><div id="fleecare"></div></section>

      <section class="sec vant">
        <h2 id="vant-title">I vantaggi del noleggio a lungo termine</h2>
        <p class="lead" id="vant-lead"></p>
        <div class="vant-list" id="vant-list"></div>
      </section>
    </main>
    <div id="flee-footer"></div>
  </div>

  <div class="pricebar" id="pricebar"></div>
  <div class="riep" id="riep"></div>

  <script src="flee-library/data/cars.js"></script>
  <script src="m-app.js"></script>
  <script>
  (function () {
    const { carById, kindOf, eur0, monthly, money, I } = MF;
    const params = new URLSearchParams(location.search);
    const car = carById(params.get('id')) || MF.cars[0];
    const kind = kindOf(car);
    const isPPU = kind === 'ppu';

    /* ===== iconos (SVG inline librería Flee + PNG) ===== */

    (function renderCard() {

      const usato = car.secondhand ? `<div class="pcard-usato"><span class="icon">${I.refresh}</span>Usato garantito</div>` : '';
      document.getElementById('pcard').innerHTML = `
        <div class="pcard${car.promo ? ' promo' : ''}">
          ${promo}
          <div class="pcard-tagrow">${deliver}</div>
          <div class="pcard-img"><img src="${car.image}" alt="${car.brand} ${car.name}"${MF.imgStyle(car)}></div>
          <div class="pcard-repr"><span class="icon">${I.info}</span>L'immagine è puramente rappresentativa</div>
          ${usato}
          <div class="pcard-title">
            <span class="kicker">Noleggio a lungo termine</span>
            <span class="name">${car.brand} ${car.name}</span>
            <span class="version">${car.modification}</span>
          </div>
          <div class="pcard-colors"><div class="lbl">Colori disponibili</div>
            <div class="vals">Bianco, Nero, Grigio, Blu, Rosso</div></div>
        </div>`;
    })();

    const fmtMesi = v => `${v} mesi`, fmtEur = v => `${eur0(v)}€`, fmtKm = v => `${eur0(v)} km`;

    const esc = s => String(s).replace(/"/g, '&quot;');
    const dropdown = (id, label, valLabel, opts, hint, dimClass) => `
      <div class="m-field">
        <label for="${id}">${label}</label>
        <div class="dd" data-dd="${id}" data-open="false">
          <button type="button" class="dd-field" id="${id}">
            <span class="dd-val${dimClass ? ' is-dim' : ''}" id="${id}-val">${valLabel}</span>
            <span class="dd-icon" aria-hidden="true"></span>
          </button>
          <div class="dd-panel" hidden>
            ${opts.map(o => `<button type="button" class="dd-opt${o.sel ? ' sel' : ''}" data-val="${esc(o.value)}">${o.label}</button>`).join('')}

        </div>
        ${hint ? `<div class="m-hint"><span class="icon">${I.bulb}</span><span>${hint}</span></div>` : ''}
      </div>`;
    const numField = (id, label, value, options, fmt, hint) =>

    /* ---- Dropdown custom: abrir/seleccionar/cerrar (delegado) ---- */
    const ddHandlers = {};
    function closeAllDD() {
      document.querySelectorAll('.dd[data-open="true"]').forEach(dd => {
        dd.dataset.open = 'false'; dd.querySelector('.dd-panel').hidden = true;
      });
    }
    document.addEventListener('click', e => {
      const trigger = e.target.closest('.dd-field');
      const opt = e.target.closest('.dd-opt');
      if (trigger) {
        const dd = trigger.closest('.dd');
        const willOpen = dd.dataset.open !== 'true';
        closeAllDD();
        if (willOpen) { dd.dataset.open = 'true'; dd.querySelector('.dd-panel').hidden = false; }
        return;
      }
      if (opt) {
        const dd = opt.closest('.dd');
        const val = opt.dataset.val;
        dd.querySelectorAll('.dd-opt').forEach(o => o.classList.toggle('sel', o === opt));
        closeAllDD();
        const fn = ddHandlers[dd.dataset.dd];
        if (fn) fn({ target: { value: val } });
        return;
      }
      if (!e.target.closest('.dd')) closeAllDD();
    });

    /* ===== Cálculo del canone ===== */
    function canone() {
      let c = (cfg.formula === 'ppu') ? car.priceFix : car.priceFlat;
      c -= (cfg.anticipo - base.anticipo) / 1000 * 7;       // +anticipo → -canone
      c += (base.durata - cfg.durata) / 12 * 10;            // durata corta → +canone
      if (!isPPU) c += (cfg.km - base.km) / 5000 * 18;      // broker: +km → +canone
      if (isPPU && cfg.gomme) c += 30;                      // add-on cambio gomme
      if (isPPU && cfg.autoSost === 'si') c += 19;          // add-on auto sostitutiva
      return Math.max(Math.round(c), 49);
    }
    const perKm = () => (cfg.formula === 'ppu' && isPPU) ? car.priceVariable : null;

    function ctaHref() {
      const km = perKm();

      return `m-preventivo.html?${q}`;
    }

        <div class="pb-price"><span class="num">${money(km)}</span>
        <span class="unit"><span class="cur"><b>€</b><span>/km</span></span><small>iva incl.</small></span></div>` : '';
      return `${withToggle ? `<button class="pricebar-toggle" id="pb-toggle">Mostra dettagli <span class="icon">${I.expand}</span></button>` : ''}
        <div class="pb-row"><div class="pb-col">${strike}${meseBlock}</div>${kmBlock}</div>
        ${promoTag}
        <a class="pb-cta">Richiedi preventivo</a>
        <p class="pb-note">Il prezzo visualizzato è un prezzo stimato</p>`;
    }

            <div class="riep-name">${car.brand} ${car.name}</div>
            <div class="riep-version">${car.modification}</div>
            <hr class="riep-divider">
            <div class="riep-specs">${specs.map(([ic, t]) => `<span class="riep-spec"><span class="icon">${ic}</span>${t}</span>`).join('')}</div>
          </div>
          <div class="riep-panel" id="riep-cosa">
            <button class="riep-acc-head" type="button">Cosa è incluso <span class="icon">${I.chevronDown}</span></button>
            <div class="riep-acc-body">
              ${cov.map(([ic, t, subs]) => `<div class="riep-ci"><span class="icon">${ic}</span><div><div class="t">${t}</div>${subs.map(s => `<div class="s">${s}</div>`).join('')}</div></div>`).join('')}
              <p class="riep-foot"><span>*</span><span>Per legge (D.L. 124/2019), bollo e superbollo li paghi tu. Possiamo occuparcene noi al posto tuo: basta il tuo ok.</span></p>
            </div>
          </div>
          <div class="riep-panel riep-summary">
            <h3>Riepilogo</h3><hr class="riep-divider">
            <div class="riep-rows">${rows.map(([k, v]) => `<div class="riep-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}</div>
          </div>
          <div class="riep-note">
            <div class="rn-top"><span class="icon">${I.bulb}</span><p>Prezzo indicativo basato su Roma. Cambia in base alla tua provincia.</p></div>
            <div class="rn-toggle"><button class="switch" role="switch" aria-checked="true" id="riep-iva"></button>Prezzo iva inclusa</div>
          </div>
        </div>
        <div class="pricebar riep-pricebar">${pbInner(false)}</div>`;
      document.querySelectorAll('#riep .pb-cta').forEach(a => a.href = ctaHref());
      document.querySelector('#riep .riep-scroll').scrollTop = 0;
    }
    function openRiep() { renderRiep(); document.getElementById('riep').classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeRiep() { document.getElementById('riep').classList.remove('open'); document.body.style.overflow = ''; }

    document.addEventListener('click', e => {
      const head = e.target.closest('.acard-head');
      if (head) head.parentElement.classList.toggle('open');
      if (e.target.closest('.inc-head')) document.getElementById('include').classList.toggle('open');
      if (e.target.closest('.pricebar-toggle')) openRiep();
      if (e.target.closest('.riep-close')) closeRiep();
      const ra = e.target.closest('.riep-acc-head');
      if (ra) ra.closest('.riep-panel').classList.toggle('closed');
      const iva = e.target.closest('#riep-iva');
      if (iva) iva.setAttribute('aria-checked', iva.getAttribute('aria-checked') !== 'true');
      const fc = e.target.closest('.fc-opt');
      if (fc) {
        if (fc.dataset.fc === 'interest') fc.classList.toggle('on');
        else { document.querySelectorAll('.fc-opt[data-fc="veh"]').forEach(o => o.classList.remove('on')); fc.classList.add('on'); }
      }
    });

    renderBar();
  })();
  </script>
</body>
</html>
